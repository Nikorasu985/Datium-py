{% load static %}
<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Perfil | Datium</title>
    <link rel="icon" type="image/jpeg" href="{% static 'img/Isotipo modo oscuro.jpeg' %}" id="favicon">
    <script src="https://cdn.tailwindcss.com/3.4.1?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script>
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .premium-gradient {
            background: linear-gradient(135deg, #137fec 0%, #0ea5e9 100%);
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark text-[#111418] dark:text-gray-100 overflow-hidden">

    <div class="flex h-screen w-full">

        <!-- Sidebar (Synced with Dashboard) -->
        <aside class="fixed inset-y-0 left-0 z-50 w-64 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl border-r border-gray-200 dark:border-gray-800 flex flex-col justify-between flex-shrink-0 h-full">
            <div>
                <div class="p-4 flex justify-center items-center h-60">
                    <img src="{% static 'img/Datium logo modo claro.jpeg' %}" class="h-full w-auto object-contain block dark:hidden p-2 hover:scale-105 transition-transform duration-300" alt="Datium">
                    <img src="{% static 'img/Datium logo modo oscuro.jpeg' %}" class="h-full w-auto object-contain hidden dark:block p-2 hover:scale-105 transition-transform duration-300" alt="Datium">
                </div>

                <div class="px-6 mb-6">
                    <button onclick="toggleTema()" class="flex items-center gap-3 w-full p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-sm font-medium text-gray-600 dark:text-gray-400">
                        <span class="material-symbols-outlined text-xl">dark_mode</span>
                        <span>Modo Oscuro</span>
                    </button>
                </div>

                <nav class="px-4 flex flex-col gap-2">
                    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl text-sm font-medium transition-colors">
                        <span class="material-symbols-outlined">dashboard</span>
                        Dashboard
                    </a>
                    <a href="connections.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl text-sm font-medium transition-colors">
                        <span class="material-symbols-outlined">cable</span>
                        Conexiones
                    </a>
                    <a href="stats.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl text-sm font-medium transition-colors">
                        <span class="material-symbols-outlined">bar_chart</span>
                        Estadísticas
                    </a>
                    <a href="audit.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl text-sm font-medium transition-colors">
                        <span class="material-symbols-outlined">history</span>
                        Auditoría
                    </a>
                </nav>
            </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800 bg-white/30 dark:bg-gray-900/30 backdrop-blur-md">
                <a href="profile.html"
                    class="flex items-center gap-3 mb-4 px-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors p-2 cursor-pointer group">
                    <div id="userAvatarContainer"
                        class="h-10 w-10 rounded-full bg-gradient-to-br from-primary to-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-md ring-2 ring-white dark:ring-gray-800 overflow-hidden group-hover:ring-primary transition-all">
                        <span id="userInitial">U</span>
                        <img id="userAvatar" src="" class="h-full w-full object-cover hidden" alt="Avatar">
                    </div>
                    <div class="flex-1 min-w-0">
                        <p id="userName"
                            class="text-sm font-bold truncate text-[#111418] dark:text-white group-hover:text-primary transition-colors">
                            Cargando...
                        </p>
                        <p id="userEmail" class="text-xs text-gray-500 truncate">...</p>
                    </div>
                </a>

                <button onclick="logout()"
                    class="flex items-center gap-2 w-full justify-center px-4 py-2.5 bg-red-50 dark:bg-red-900/10 border border-red-200 dark:border-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/20 rounded-xl text-sm font-bold transition-all shadow-sm">
                    <span class="material-symbols-outlined text-lg">logout</span>
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 h-full overflow-y-auto bg-background-light dark:bg-background-dark relative scroll-smooth overflow-x-hidden">
            
            <!-- Mobile Header (Dashboard Style) -->
            <div class="flex items-center justify-between p-4 md:hidden bg-white/80 dark:bg-[#101922]/80 backdrop-blur-md z-30 border-b border-gray-200 dark:border-gray-800">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <span class="font-bold text-lg text-[#111418] dark:text-white">Perfil</span>
                </div>
            </div>


            <div class="p-4 md:p-12 max-w-6xl mx-auto space-y-12 pb-24 relative z-10 w-full">
                
                <section class="grid lg:grid-cols-3 gap-12">
                    <!-- Left: Profile Info -->
                    <div class="lg:col-span-1 space-y-8">
                        <div class="relative group w-48 mx-auto lg:mx-0">
                            <div class="w-48 h-48 rounded-[3rem] bg-gradient-to-br from-primary to-blue-600 p-1 shadow-2xl relative overflow-hidden ring-4 ring-white dark:ring-gray-800 transition-all group-hover:ring-primary/50">
                                <img id="profileAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Nico" class="w-full h-full object-cover rounded-[2.8rem]" alt="Avatar">
                                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white cursor-pointer" onclick="document.getElementById('avatarInput').click()">
                                    <span class="material-symbols-outlined text-4xl">photo_camera</span>
                                </div>
                            </div>
                            <input type="file" id="avatarInput" class="hidden" accept="image/*" onchange="handleAvatarChange(this)">
                        </div>

                        <div class="space-y-2 text-center lg:text-left">
                            <h1 id="displayNameMain" class="text-4xl font-black text-gray-900 dark:text-white tracking-tighter">Nombre Usuario</h1>
                            <p class="text-sm font-bold text-primary uppercase tracking-widest flex items-center justify-center lg:justify-start gap-2">
                                <span class="material-symbols-outlined text-base">verified</span>
                                Plan <span id="currentPlanName">Cargando...</span>
                            </p>
                        </div>
                    </div>

                    <!-- Right: Edit Form -->
                    <div class="lg:col-span-2">
                        <div class="bg-white dark:bg-[#151f2b] p-8 md:p-10 rounded-[2.5rem] shadow-xl border border-gray-100 dark:border-gray-800 space-y-10">
                            <div class="grid md:grid-cols-2 gap-8">
                                <div class="space-y-3">
                                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest px-1">Nombre Completo</label>
                                    <input type="text" id="profileName" class="w-full bg-gray-50/50 dark:bg-black/20 border-2 border-transparent rounded-2xl px-6 py-4 font-bold focus:border-primary shadow-sm transition-all outline-none" placeholder="Tu nombre">
                                </div>
                                <div class="space-y-3">
                                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest px-1">Email (Solo Lectura)</label>
                                    <div class="relative">
                                        <input type="email" id="profileEmail" readonly class="w-full bg-gray-100 dark:bg-gray-900 border-2 border-transparent rounded-2xl px-6 py-4 font-bold text-gray-400 outline-none italic" placeholder="email@ejemplo.com">
                                        <span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-gray-300 dark:text-gray-700">lock</span>
                                    </div>
                                </div>
                                <div class="space-y-3 md:col-span-2">
                                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest px-1">Número de Teléfono <span class="text-red-500">*</span></label>
                                    <input type="tel" id="profilePhone" required class="w-full bg-gray-50/50 dark:bg-black/20 border-2 border-transparent rounded-2xl px-6 py-4 font-bold focus:border-primary shadow-sm transition-all outline-none" placeholder="+57 300 000 0000">
                                </div>
                            </div>
                            <button onclick="updateProfile()" class="w-full py-5 rounded-3xl premium-gradient text-white font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-primary/20 hover:shadow-primary/40 hover:-translate-y-1 transition-all active:scale-[0.98]">
                                Guardar Cambios
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Plan Management -->
                <section class="space-y-8">
                    <div class="flex items-center gap-4">
                        <div class="h-1 py-1 px-1 bg-primary rounded-full w-8"></div>
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em]">Suscripción y Límites</h3>
                    </div>
                    <div id="plansContainer" class="grid md:grid-cols-3 gap-8">
                        <div class="col-span-3 text-center text-gray-500 dark:text-gray-400 py-10">Cargando planes...</div>
                    </div>
                </section>
            </div>
            
            <div class="pb-12 text-center">
                <button onclick="openPoliciesModal()" class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] hover:text-primary transition-colors cursor-pointer underline underline-offset-8 decoration-2 decoration-gray-200 dark:decoration-gray-800">Términos y Condiciones</button>
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="{% static 'js/auth.js' %}"></script>
    <script src="{% static 'js/app.js' %}"></script>
    <script src="{% static 'js/common_ui.js' %}"></script>
    <script src="{% static 'js/profile.js' %}?v=2"></script>
    <script>
        function toggleSidebar() {
            const side = document.querySelector('aside');
            side.classList.toggle('-translate-x-full');
        }
    </script>
</body>
</html>
